<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><meta name='apple-mobile-web-app-capable' content='yes'><meta name='apple-mobile-web-app-title' content='CI Checklist v3'><title>CI Checklist v3</title><style>body{margin:0;background:#f4f6f8;color:#1f2937;font-family:Arial,Helvetica,sans-serif;line-height:1.45}header{background:#173f67;color:white;padding:22px}h1{margin:0;font-size:24px}.wrap{max-width:1320px;margin:auto;padding:14px;display:grid;grid-template-columns:370px 1fr;gap:14px}.p{background:white;border:1px solid #d1d5db;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px #0001}.p h2{margin:0;padding:12px 14px;background:#eef2f7;border-bottom:1px solid #d1d5db;font-size:17px}.b{padding:14px}label{display:block;font-weight:bold;margin:12px 0 5px;font-size:13px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:8px;padding:9px;font-size:14px}textarea{min-height:66px}.c label{font-weight:normal;display:flex;gap:8px;margin:7px 0}.c input{width:auto}.n{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;border-radius:9px;padding:10px;font-size:13px}.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#065f46;border-radius:9px;padding:10px;margin-bottom:12px}.s{background:white;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;overflow:hidden}.s h3{margin:0;padding:10px 12px;background:#f9fafb;border-bottom:1px solid #d1d5db;font-size:15px}.s ul{list-style:none;margin:0;padding:8px 12px 12px}.s li{display:flex;gap:8px;padding:7px 0;border-bottom:1px dashed #e5e7eb}.s li:last-child{border-bottom:0}.sub{display:block;margin-top:4px;color:#374151;font-size:13px}.tag{font-weight:bold;color:#173f67}.pill{display:inline-block;border:1px solid #d1d5db;border-radius:999px;padding:3px 7px;font-size:11px;margin:2px}.m{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}.m div{background:#f9fafb;border:1px solid #d1d5db;border-radius:8px;padding:8px;font-size:13px}.m strong{display:block;color:#6b7280;font-size:11px;text-transform:uppercase}.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th,.tbl td{border:1px solid #d1d5db;padding:7px;vertical-align:top}.tbl th{background:#f9fafb}button{background:#173f67;color:white;border:0;border-radius:8px;padding:10px 12px;font-weight:bold;margin:12px 8px 0 0}.g{background:#374151}@media(max-width:900px){.wrap{grid-template-columns:1fr}.m{grid-template-columns:1fr}}@media print{header,aside,.act{display:none}.wrap{display:block}.p{box-shadow:none;border:0}.s{break-inside:avoid}}</style></head><body><header><h1>CI Federal Charge Checklist Builder v3</h1><p>Elements + evidence + lawful investigative methods + EC language + next steps.</p></header><main class='wrap'><aside class='p'><h2>Inputs</h2><div class='b'><div class='n'>Planning aid only. Verify exact law, policy, approvals, and charging guidance with OGC/CDC/AUSA.</div><label>Federal Charge / Template</label><select id='charge'></select><label>Case / Subject</label><input id='case' placeholder='Subject A / File Review'><label>Case Theory / Conduct</label><textarea id='theory'></textarea><label>Weakest Element</label><select id='weak'><option>Intent / Knowledge</option><option>Federal Jurisdiction / U.S. Nexus</option><option>Foreign Nexus / CI Relevance</option><option>Agreement / Direction / Tasking</option><option>Materiality / Impact</option><option>Attribution / Identity</option><option>Unauthorized Access / No Authorization</option><option>Overt Act / Conduct</option><option>Protected Information / Classified / Trade Secret</option></select><label>Custom Elements</label><textarea id='custom' placeholder='Custom mode: one element per line'></textarea><label>CI Flags</label><div class='c' id='flags'></div><label>Source Sensitivity</label><div class='c' id='srcs'></div><label>Known Facts / Notes</label><textarea id='facts'></textarea><div class='act'><button id='gen'>Generate</button><button class='g' id='prt'>Print/PDF</button><button class='g' id='cpy'>Copy</button></div></div></aside><section class='p'><h2>Generated Case Packet</h2><div class='b' id='out'></div></section></main><script>
const flags=['Foreign military service','Foreign government/SOE contact','Foreign intelligence/security concern','Sanctions/restricted party nexus','Export-controlled technology','Procurement for foreign end user','Undisclosed travel/foreign meetings','Sensitive U.S. access','Foreign payments/funding','Cyber/technical access'];
const srcs=['Open source','Bureau records','Partner agency','Legal process','CHS-derived','Classified','AUSA coordination needed','Victim/custodian records'];
const tactics=['Record/database checks and preservation','Witness/custodian/subject interviews','OSINT preservation and corroboration','Financial analysis and lawful bank records','Travel/border/visa/airline/hotel record analysis','Provider records, logs, device/account evidence, and forensics when authorized','CI analysis, link charts, source validation, liaison coordination','CHS/undercover/surveillance/technical collection only when predicated, authorized, and approved'];
const baseEvidence=['Original records and source documents','Communications, logs, or transaction records','Timeline and actor/link chart','Witness or custodian corroboration','Legal process returns when authorized','Source-sensitivity and disclosure review'];
const T={
'18 USC 1001 — False Statements':['Statement/concealment/false document','Falsity','Knowledge and willfulness','Materiality','Federal jurisdiction'],
'18 USC 956 — Conspiracy to Commit Violence Abroad':['Agreement/conspiracy','Covered foreign objective','U.S. jurisdiction or U.S.-based conduct','Intent and knowing participation'],
'18 USC 951 — Agents of Foreign Government':['Acts in the United States','Agency relationship with foreign government/official','Knowledge of foreign government connection','No required notification or exception issue'],
'FARA — Foreign Agent Registration':['Foreign principal','Agency relationship','Covered political/PR/lobbying/informational activity','Registration issue and willfulness'],
'Espionage Act — 18 USC 793/794/798':['Protected information/NDI/classified intelligence','Unauthorized access/retention/transmission/disclosure','Unauthorized recipient or disclosure pathway','Knowledge/reason to believe/willfulness','National security or foreign-benefit context'],
'Economic Espionage — 18 USC 1831/1832':['Trade secret/proprietary information','Theft/copying/download/transmission/possession','Intent/knowledge','Foreign government benefit or economic benefit/injury','Interstate/foreign commerce nexus'],
'OFAC / IEEPA Sanctions Violations':['Applicable OFAC sanctions program/prohibition','Prohibited transaction/service/dealing/facilitation/evasion','U.S. nexus','Knowledge/willfulness/evasion','No license/exemption/authorization'],
'Computer Fraud — 18 USC 1030 CFAA':['Protected computer/system','Unauthorized access or exceeded access','Prohibited result/object','Intent/knowledge','Attribution'],
'18 USC 2339A/B — Material Support':['Material support/resources','Recipient/designated organization or predicate offense','Knowledge','Attempt/conspiracy/facilitation'],
'18 USC 2381 — Treason':['Enemy/wartime legal context','Aid and comfort or levying war','Intent/adherence','Special proof concerns'],
'18 USC 2384 — Seditious Conspiracy':['Agreement','Covered objective by force','Knowing participation','Overt acts/corroboration'],
'18 USC 371 — Conspiracy':['Agreement','Unlawful objective','Knowing and voluntary participation','Overt act'],
'18 USC 1956 — Money Laundering':['Financial transaction','Proceeds of specified unlawful activity','Intent/purpose to promote, conceal, evade, or move funds','Knowledge'],
'18 USC 1957 — Criminal Monetary Transactions':['Monetary transaction over threshold','Criminally derived property/SUA','Knowledge','Financial institution or U.S. nexus'],
'18 USC 1343 — Wire Fraud':['Scheme to defraud','Intent to defraud','Material misrepresentation/omission','Use of interstate/foreign wires'],
'18 USC 1344 — Bank Fraud':['Covered financial institution','Scheme to defraud or obtain bank property','Intent to defraud','Execution or attempt'],
'18 USC 1546 — Immigration/Visa Fraud':['Immigration document or statement','False/forged/altered/fraudulently obtained','Use/submission/possession/attempt','Knowledge'],
'18 USC 1028 — Identity Document Fraud':['Prohibited conduct','Identification document/authentication feature','Intent/knowledge','Federal nexus'],
'ECRA / Export Controls':['Controlled item/technology/software/service','Export/reexport/transfer/facilitation','License requirement or restricted end user/use','Knowledge/willfulness/red flags','No valid authorization'],
'AECA / ITAR — 22 USC 2778':['Defense article/service/technical data','Export/transfer/brokering/provision','Foreign person/end user/destination','Willfulness/knowledge','No authorization'],
'Procurement Fraud / False Claims':['Federal procurement or claim','False claim/certification/fraudulent conduct','Materiality','Knowledge/intent','Loss/benefit/federal nexus'],
'Custom / Any Federal Statute':[]};
function $(x){return document.getElementById(x)}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function lines(s){return String(s||'').split(/\n+/).map(x=>x.trim()).filter(Boolean)}function checked(cls){return Array.from(document.querySelectorAll('.'+cls)).filter(x=>x.checked).map(x=>x.value)}function section(t,items){return '<div class=s><h3>'+esc(t)+'</h3><ul>'+items.map(i=>'<li><span>□</span><span>'+i+'</span></li>').join('')+'</ul></div>'}function fmt(l,a){return '<span class=sub><span class=tag>'+l+':</span><br>'+a.map(x=>'• '+esc(x)).join('<br>')+'</span>'}function evFor(el){let s=el.toLowerCase(),e=[...baseEvidence];if(s.includes('intent')||s.includes('knowledge'))e.push('Warnings, training, certifications, admissions, concealment, contradictions, repeated conduct');if(s.includes('foreign')||s.includes('agent')||s.includes('fara'))e.push('Foreign actor identity, tasking, direction, payments, travel, reporting, foreign-benefit evidence');if(s.includes('computer')||s.includes('access')||s.includes('attribution'))e.push('Logs, device/account linkage, provider records, IP/VPN, malware/infrastructure, custodian records');if(s.includes('classified')||s.includes('espionage')||s.includes('ndi')||s.includes('trade secret'))e.push('Classification/trade-secret proof, custodian/victim records, access controls, NDAs, damage/value review');if(s.includes('sanctions')||s.includes('ofac')||s.includes('license')||s.includes('export'))e.push('Sanctions/export screening, license checks, end-user/destination records, shipping/customs, compliance warnings');if(s.includes('financial')||s.includes('money')||s.includes('fraud'))e.push('Bank records, invoices, wires, crypto/cash records, source-of-funds and benefit analysis');return e}function methFor(el){let m=[...tactics];if(el.toLowerCase().includes('classified'))m.push('Classification/CIPA/victim-agency review through approved channels');return m}function weakAdvice(w){return {'Intent / Knowledge':['Prior warnings, training, certifications, admissions, repeated conduct, concealment, and contradictory statements.','Next: compare communications, prior forms, access banners, compliance warnings, and interview/custodian records.'],'Federal Jurisdiction / U.S. Nexus':['Agency records, U.S. person/company nexus, U.S. financial system, U.S. server/provider, federal process, or commerce facts.','Next: obtain custodian/federal program records and jurisdictional source documents.'],'Foreign Nexus / CI Relevance':['Foreign actor, foreign beneficiary, direction/tasking, payment, travel, foreign-state link, or sensitive-access facts.','Next: build actor-benefit-access chart and corroborate with records/partner coordination.'],'Agreement / Direction / Tasking':['Communications, meetings, roles, instructions, reports, reimbursements, and coordinated acts.','Next: build timeline and link chart.'],'Materiality / Impact':['Agency purpose, victim/custodian explanation, adjudication/payment/access impact.','Next: document why truth would matter to decision/function.'],'Attribution / Identity':['Device/account linkage, subscriber/provider records, payment records, travel, witness info, handle reuse, admissions.','Next: create attribution matrix.'],'Unauthorized Access / No Authorization':['Access rules, permissions, revocation, banners, license checks, compliance files.','Next: obtain custodian records and authorization/licensing confirmation.'],'Overt Act / Conduct':['Chronological acts, source record for each act, how each advanced objective.','Next: prepare overt-act table.'],'Protected Information / Classified / Trade Secret':['Classification/trade-secret proof, access controls, owner/victim records, damage/value.','Next: coordinate victim agency/company custodian review.']}[w]||[]}
function init(){Object.keys(T).forEach(k=>{let o=document.createElement('option');o.value=k;o.textContent=k;$('charge').appendChild(o)});$('flags').innerHTML=flags.map(f=>'<label><input type=checkbox class=flag value="'+esc(f)+'"> '+esc(f)+'</label>').join('');$('srcs').innerHTML=srcs.map(s=>'<label><input type=checkbox class=src value="'+esc(s)+'"> '+esc(s)+'</label>').join('');load();gen()}function load(){let k=$('charge').value;$('theory').value='Subject may have conduct relevant to '+k+'.';if(k!=='Custom / Any Federal Statute')$('custom').value=''}function elements(){let k=$('charge').value;return k==='Custom / Any Federal Statute'?lines($('custom').value):T[k]}function gen(){let k=$('charge').value,els=elements();if(!els.length)els=['Custom element 1','Custom element 2'];let fl=checked('flag'),sr=checked('src'),weak=$('weak').value;let pills=a=>a.length?a.map(x=>'<span class=pill>'+esc(x)+'</span>').join(''):'<span class=small>None selected</span>';let h='<div class=m><div><strong>Case</strong>'+esc($('case').value||'Unspecified')+'</div><div><strong>Charge</strong>'+esc(k)+'</div><div><strong>Weakest</strong>'+esc(weak)+'</div><div><strong>CI Flags</strong>'+pills(fl)+'</div><div><strong>Source Sensitivity</strong>'+pills(sr)+'</div><div><strong>Generated</strong>'+new Date().toLocaleString()+'</div></div><div class=ok><b>Case theory:</b> '+esc($('theory').value)+'</div>';if($('facts').value.trim())h+=section('Known Facts / Notes',[esc($('facts').value).replace(/\n/g,'<br>')]);h+=section('EC-Ready Case Theory Language',['Based on the known facts, the subject may have conduct relevant to '+esc(k)+'. The matter is CI-relevant to the extent corroborated facts show foreign nexus, foreign benefit, sensitive access, concealment, cyber activity, procurement, sanctions/export exposure, or foreign direction. Additional investigation should focus on the weakest element: '+esc(weak)+'.']);h+=section('Weakest Element Guidance',weakAdvice(weak));els.forEach((el,i)=>{h+=section('Element '+(i+1)+' — '+el,[esc('What to prove: '+el),fmt('Evidence needed',evFor(el)),fmt('Authorized investigative methods / tactics',methFor(el))])});h+='<div class=s><h3>Element Matrix Table</h3><div style="padding:12px"><table class=tbl><tr><th>Element</th><th>Evidence</th><th>Next Step</th><th>Status</th></tr>'+els.map(e=>'<tr><td>'+esc(e)+'</td><td>Obtained: ____<br>Needed: ____</td><td>____</td><td>____</td></tr>').join('')+'</table></div></div>';h+=section('Progress vs. Activity',['Activity: reviewed records. Progress: tied a record to a specific element and narrowed the next step.','Activity: conducted OSINT. Progress: corroborated foreign nexus, actor identity, or timeline fact with preserved source notes.','Activity: coordinated with partner agency. Progress: confirmed jurisdiction, authorization status, victim-agency equities, or classification/trade-secret issue.']);h+=section('Next Best Investigative Step',['Focus on '+esc(weak)+'.','Choose one next step tied to one element: record, interview, legal process, partner coordination, classification/export/sanctions check, or attribution work.','Document how the step moves the case toward proof or closes a gap.']);h+=section('Source Sensitivity / Handling',sr.length?sr.map(s=>'Selected source category — '+esc(s)+': document handling restrictions, minimization needs, disclosure risk, and review/approval needs.'):['Select source sensitivity tags to identify handling restrictions and review needs.']);h+=section('Supervisor Brief / EC Language',['Theory: Subject may have violated or be relevant to '+esc(k)+' through the conduct described above.','CI nexus: frame around foreign nexus, foreign benefit, access, concealment, technology/procurement, sanctions/export exposure, cyber activity, or foreign direction supported by facts.','Next action: strengthen '+esc(weak)+' with targeted records, interviews, partner coordination, or approved legal process.']);h+=section('Quality Control / File Review',['Can I explain the theory in one sentence?','Can I map facts to every element?','Can I separate evidence obtained from evidence needed?','Is CI nexus factual rather than assumed?','Is source sensitivity handled correctly?','Does the next step show progress rather than activity?']);$('out').innerHTML=h}
$('charge').addEventListener('change',()=>{load();gen()});$('gen').addEventListener('click',gen);$('prt').addEventListener('click',()=>print());$('cpy').addEventListener('click',()=>navigator.clipboard.writeText($('out').innerText).then(()=>alert('Copied.')));init();</script></body></html>
